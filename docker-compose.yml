services:
  postgres:
    image: postgres:16-alpine
    container_name: preset-postgres
    environment:
      POSTGRES_DB: preset
      POSTGRES_PASSWORD: preset
      POSTGRES_USER: preset
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U preset -d preset"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
