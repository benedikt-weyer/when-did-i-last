name: Release Containers

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write


concurrency:
  group: release-containers-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  create-tags:
    runs-on: ubuntu-latest

    outputs:
      created_releases: ${{ steps.version.outputs.created_releases }}
      created_release_count: ${{ steps.version.outputs.created_release_count }}
      final_tag: ${{ steps.version.outputs.final_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate and create release tags
        id: version
        run: |
          node ./scripts/release-tags.mjs

      - name: Write workflow summary
        run: |
          {
            echo '## Container release'
            echo
            echo "Final tag: ${{ steps.version.outputs.final_tag }}"
            echo
            echo "New tags created: ${{ steps.version.outputs.created_release_count }}"
            echo
            echo 'Processed commits:'
            echo
            while IFS= read -r line; do
              echo "- $line"
            done <<< "${{ steps.version.outputs.release_plan }}"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-images:
    needs: create-tags
    if: ${{ needs.create-tags.outputs.created_release_count != '0' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        release: ${{ fromJson(needs.create-tags.outputs.created_releases) }}
        service:
          - backend
          - web

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.release.commit }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=raw,value=${{ matrix.release.tag }}
            type=raw,value=latest,enable=${{ matrix.release.tag == needs.create-tags.outputs.final_tag }}

      - name: Build and publish container image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service == 'backend' && 'apps/backend' || '.' }}
          file: ${{ matrix.service == 'backend' && 'apps/backend/Dockerfile' || 'apps/web/Dockerfile' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Write publish summary
        run: |
          {
            echo '## Published container image'
            echo
            echo "Service: ${{ matrix.service }}"
            echo "Tag: ${{ matrix.release.tag }}"
            echo "Commit: ${{ matrix.release.commit }}"
            echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ matrix.release.tag }}"
          } >> "$GITHUB_STEP_SUMMARY"